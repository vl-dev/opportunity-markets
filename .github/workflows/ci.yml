name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  rust-lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins the channel (1.89.0) and the
      # rustfmt + clippy components, so rustup installs them on first use.
      - name: Show toolchain
        run: rustup show

      - name: rustfmt (check formatting)
        run: cargo fmt --all -- --check

      - name: clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
